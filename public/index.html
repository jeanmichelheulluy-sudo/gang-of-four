<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gang of Four Multi</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1e3d2f; color: white; text-align: center; margin: 0; padding: 10px; user-select: none; }
        .box-menu { background: #145a32; border: 4px solid #d4ac0d; padding: 20px; border-radius: 15px; max-width: 400px; margin: 40px auto; }
        .score-bar { background-color: rgba(0, 0, 0, 0.6); border: 2px solid #f1c40f; border-radius: 8px; padding: 8px; margin-bottom: 15px; display: flex; justify-content: space-around; font-size: 0.9em; }
        .table-jeu { background-color: #145a32; border: 4px solid #d4ac0d; border-radius: 15px; padding: 15px; max-width: 600px; margin: 0 auto; display: none; }
        .adversaire { background: rgba(0,0,0,0.4); margin: 5px; padding: 8px; border-radius: 8px; font-size: 0.9em; }
        .tour-actif { background: rgba(241, 196, 15, 0.4) !important; border: 2px solid #f1c40f !important; }
        .table-centre { background-color: rgba(0, 0, 0, 0.2); border: 2px dashed #27ae60; min-height: 105px; margin: 10px 0; display: flex; justify-content: center; align-items: center; gap: 5px; }
        .zone-cartes { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; min-height: 100px; }
        .carte { width: 55px; height: 85px; background-color: #f7f4eb; border-radius: 6px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid #c8bfa5; cursor: pointer; color: black; font-weight: bold; position: relative; }
        .carte.selected { transform: translateY(-15px); border: 2px solid #3498db; }
        
        /* Couleurs standards */
        .Vert { color: #1a6b3c; } .Jaune { color: #dcb315; } .Rouge { color: #b02126; }
        .Multi { background: linear-gradient(135deg, #e8f5e9, #fff9c4, #ffebee) !important; border: 2px solid #8e44ad !important; }
        
        /* Le filtre rouge magique pour le Dragon */
        .Dragon .center, .Dragon .corner { filter: drop-shadow(0px 0px 3px red) sepia(1) hue-rotate(-50deg) saturate(5); }

        .corner { font-size: 0.7em; padding: 2px; position: absolute; } .top-left { top: 0; left: 0; } .bottom-right { bottom: 0; right: 0; transform: rotate(180deg); }
        .center { font-size: 1.8em; display: flex; justify-content: center; align-items: center; height: 100%; }
        button { background-color: #e67e22; color: white; border: none; padding: 10px 20px; font-size: 1em; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        input[type="text"] { padding: 8px; font-size: 1em; border-radius: 5px; border: none; text-align: center; margin-bottom: 15px; width: 80%; }
    </style>
</head>
<body>

    <h1>Gang of Four 🌐</h1>

    <div id="ecran-connexion" class="box-menu">
        <div>
            <label style="font-weight: bold;">Renseigne ton nom :</label><br>
            <input type="text" id="input-pseudo" placeholder="Ex: Jean" value="Joueur 1">
        </div>
        <hr style="border-color: rgba(255,255,255,0.1); margin: 15px 0;">

        <div id="zone-hote" style="display:none;">
            <h3>Tu es le Chef de Table</h3>
            <label>Nombre de joueurs réels :</label><br><br>
            <select id="select-joueurs" style="padding: 8px; font-size: 1em;">
                <option value="1">1 Humain (Toi + 3 IA)</option>
                <option value="2" selected>2 Humains (+ 2 IA)</option>
                <option value="3">3 Humains (+ 1 IA)</option>
                <option value="4">4 Humains (Zéro IA)</option>
            </select><br><br>
            <button onclick="validerConfig()">Ouvrir la Table</button>
        </div>
        <div id="zone-attente" style="display:none;">
            <h3>Rejoindre la table</h3>
            <p id="txt-attente">Le chef configure la table...</p>
            <button id="btn-rejoindre" style="display:none;" onclick="rejoindre()">Se mettre à table</button>
        </div>
    </div>

    <div id="score-bar" class="score-bar" style="display:none;">
        <span id="sc-0">-</span><span id="sc-1">-</span><span id="sc-2">-</span><span id="sc-3">-</span>
    </div>

    <div id="tapis" class="table-jeu">
        <div class="adversaire" id="box-ia2">-</div>
        <div style="display: flex; justify-content: space-between;">
            <div class="adversaire" id="box-ia1">-</div>
            <div class="adversaire" id="box-ia3">-</div>
        </div>

        <div id="annonce-table">En attente...</div>
        <div id="table-centre" class="table-centre">Table vide</div>

        <hr style="border-color: #d4ac0d;">
        <h3>Ta Main (<span id="txt-compteur">0</span> cartes) :</h3>
        <div id="ma-zone-cartes" class="zone-cartes"></div>

        <div style="margin-top: 15px;">
            <button id="btn-jouer" onclick="envoyerCartes()">Jouer</button>
            <button id="btn-passer" onclick="envoyerPasser()">Passer</button>
            <button id="btn-suivant" style="display:none; background:#8e44ad;" onclick="demanderSuivant()">Manche Suivante</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let monIndexJoueur = null;
        let cartesSelectionnees = [];
        let modeEchange = false;

        socket.on('statutHote', (isHote) => {
            if(isHote) { 
                document.getElementById('zone-hote').style.display = 'block'; 
            } else {
                document.getElementById('zone-attente').style.display = 'block';
                document.getElementById('btn-rejoindre').style.display = 'inline-block';
                document.getElementById('txt-attente').innerText = "Renseigne ton nom puis clique ci-dessous.";
            }
        });

        function validerConfig() {
            let nb = document.getElementById('select-joueurs').value;
            let pseudo = document.getElementById('input-pseudo').value.trim() || "Joueur 1";
            socket.emit('configurerPartie', { nbHumains: nb, pseudo: pseudo });
            document.getElementById('zone-hote').style.display = 'none';
            document.getElementById('zone-attente').style.display = 'block';
        }

        function rejoindre() {
            let pseudo = document.getElementById('input-pseudo').value.trim() || "Invité";
            socket.emit('rejoindrePartie', { pseudo: pseudo });
            document.getElementById('btn-rejoindre').disabled = true;
            document.getElementById('txt-attente').innerText = "Attente des autres joueurs...";
        }

        socket.on('attenteJoueurs', (data) => {
            document.getElementById('txt-attente').innerText = `Joueurs connectés : ${data.connectes} / ${data.requis}`;
        });

        socket.on('demandeEchange', (carteRecue) => {
            modeEchange = true;
            let nomCarte = carteRecue.display || carteRecue.rang;
            document.getElementById('annonce-table').innerText = `🎁 TRIBUT ! Tu as reçu le ${nomCarte} ! Choisis une carte à rendre.`;
            document.getElementById('btn-jouer').innerText = "Rendre la carte";
            document.getElementById('btn-jouer').disabled = false;
            document.getElementById('btn-passer').style.display = 'none';
        });

        socket.on('etatPartie', (data) => {
            document.getElementById('ecran-connexion').style.display = 'none';
            document.getElementById('score-bar').style.display = 'flex';
            document.getElementById('tapis').style.display = 'block';

            monIndexJoueur = data.votreIndex;
            cartesSelectionnees = [];

            for(let i=0; i<4; i++) { 
                document.getElementById(`sc-${i}`).innerText = `${data.nomsJoueurs[i]} : ${data.scoresGlobaux[i]} pts`; 
            }

            let mapping = [
                { id: 'box-ia1', idx: (monIndexJoueur + 1) % 4 },
                { id: 'box-ia2', idx: (monIndexJoueur + 2) % 4 },
                { id: 'box-ia3', idx: (monIndexJoueur + 3) % 4 }
            ];

            mapping.forEach(m => {
                let div = document.getElementById(m.id);
                div.innerText = `${data.nomsJoueurs[m.idx]} : ${data.taillesMains[m.idx]} cartes`;
                div.classList.remove('tour-actif');
                if(!data.phaseEchange && data.joueurActif === m.idx) div.classList.add('tour-actif');
            });

            if (!data.phaseEchange) {
                document.getElementById('btn-jouer').innerText = "Jouer";
                document.getElementById('btn-passer').style.display = 'inline-block';

                if(data.joueurActif === monIndexJoueur) {
                    document.getElementById('annonce-table').innerText = "👑 À TOI DE JOUER !";
                    document.getElementById('btn-jouer').disabled = false;
                    document.getElementById('btn-passer').disabled = false;
                } else {
                    document.getElementById('annonce-table').innerText = `Tour de : ${data.nomsJoueurs[data.joueurActif]}`;
                    document.getElementById('btn-jouer').disabled = true;
                    document.getElementById('btn-passer').disabled = true;
                }
            } else if (data.dernierGagnant !== monIndexJoueur) {
                document.getElementById('annonce-table').innerText = "Attente du choix de Tribut du gagnant...";
                document.getElementById('btn-jouer').disabled = true;
                document.getElementById('btn-passer').disabled = true;
            }

            let tableCentre = document.getElementById('table-centre');
            tableCentre.innerHTML = "";
            if(data.etatTable) {
                document.getElementById('annonce-table').innerText = `${data.etatTable.nomProprio} a posé : ${data.etatTable.nom}`;
                data.etatTable.cartes.forEach(c => { tableCentre.appendChild(creerVisuelCarte(c, false)); });
            } else if (!data.phaseEchange) {
                tableCentre.innerHTML = '<span style="color:#27ae60; font-style:italic;">Table vide - Nouveau Pli</span>';
            }

            let zoneMain = document.getElementById('ma-zone-cartes');
            zoneMain.innerHTML = "";
            document.getElementById('txt-compteur').innerText = data.maMain.length;
            data.maMain.forEach(c => { zoneMain.appendChild(creerVisuelCarte(c, true)); });
        });

        function creerVisuelCarte(carte, cliquable) {
            let div = document.createElement('div');
            div.className = `carte ${carte.couleur} ${carte.classe || ''}`;
            let txt = carte.display || carte.rang;
            div.innerHTML = `<div class="corner top-left">${txt}</div><div class="center">${txt}</div><div class="corner bottom-right">${txt}</div>`;
            
            if(cliquable) {
                div.onclick = function() {
                    div.classList.toggle('selected');
                    let idx = cartesSelectionnees.findIndex(c => c.id === carte.id);
                    if(idx > -1) cartesSelectionnees.splice(idx, 1);
                    else cartesSelectionnees.push(carte);
                };
            }
            return div;
        }

        function envoyerCartes() {
            if(cartesSelectionnees.length === 0) return;

            if (modeEchange) {
                if(cartesSelectionnees.length !== 1) { alert("Tu ne peux rendre qu'une seule carte !"); return; }
                socket.emit('actionDonnerCarte', cartesSelectionnees[0].id);
                modeEchange = false;
                return;
            }

            socket.emit('actionJouer', cartesSelectionnees);
        }

        function envoyerPasser() { socket.emit('actionPasser'); }

        socket.on('finManche', (data) => {
            document.getElementById('annonce-table').innerText = `Manche terminée ! Gagnant : ${data.nomGagnant}`;
            document.getElementById('btn-suivant').style.display = 'inline-block';
            document.getElementById('btn-jouer').disabled = true;
            document.getElementById('btn-passer').disabled = true;
        });

        function demanderSuivant() {
            document.getElementById('btn-suivant').style.display = 'none';
            socket.emit('demandeNouvelleManche');
        }

        socket.on('erreur', (msg) => { alert(msg); });
    </script>
</body>
</html>
